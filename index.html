<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="FieldNotes"/>
  <title>FieldNotes</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css?v=8"/>
</head>
<body>
<div id="root"></div>

<!-- ── Vendor libraries (do not edit) ─────────────────────────────────────── -->
<script src="lib/msal.min.js"></script>
<script src="lib/react.min.js"></script>
<script src="lib/react-dom.min.js"></script>
<script src="lib/pdfjs-worker.min.js"></script>
<script src="lib/pdfjs.min.js"></script>
<script>
  /* Configure PDF.js worker.
     pdfjs-worker.min.js (loaded above) creates a blob URL and stores it in
     window.__pdfWorkerUrl — use that blob URL as the workerSrc so PDF.js
     can actually start the worker. Do NOT overwrite __pdfWorkerUrl. */
  if (window.pdfjsLib && window.__pdfWorkerUrl) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = window.__pdfWorkerUrl;
  }
</script>
<script src="lib/vendor-extra.min.js"></script>

<!-- ── App source files (load order matters — dependencies first) ─────────── -->
<script src="src/constants.js?v=8"></script>   <!-- themes, config, seed data           -->
<script src="src/utils.js?v=8"></script>       <!-- uid, fmt, ts, ds, dl, load/saveData -->
<script src="src/db.js?v=8"></script>          <!-- IndexedDB helpers                   -->
<script src="src/onedrive.js?v=8"></script>    <!-- MSAL auth, upload, sync, hook       -->
<script src="src/primitives.js?v=8"></script>  <!-- Chip, Toggle, Avatar, BackButton    -->
<script src="src/drawing.js?v=8"></script>     <!-- DirectionWheel, MiniDir, CameraCone, markup -->
<script src="src/HomeScreen.js?v=8"></script>  <!-- HomeScreen, ProjectDetail, VisitRow -->
<script src="src/ProjectView.js?v=8"></script> <!-- ProjectView, PunchList, sheets      -->
<script src="src/NewVisitSetup.js?v=8"></script> <!-- 2-step new visit wizard           -->
<script src="src/reports.js?v=8"></script>     <!-- generatePDF, generateDOCX, ReportPanel -->
<script src="src/ObservationTool.js?v=8"></script> <!-- The main inspection UI          -->
<script src="src/App.js?v=8"></script>         <!-- Root App + ReactDOM.createRoot()    -->

</body>
</html>
